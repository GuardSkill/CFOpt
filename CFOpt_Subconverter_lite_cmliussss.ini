[custom]
; CFOpt lite subconverter config for asdlokj1qpi233/subconverter backends.
; Keep ruleset entries below the default max_allowed_rulesets limit of 64.

; App rule lists
; Polymarket is inlined so backend rule-file fetch failures do not drop routing.
ruleset=Polymarket,[]DOMAIN-SUFFIX,gamma-api.polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,data-api.polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,clob.polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,ws-subscriptions-clob.polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,ws-subscriptions-user.polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,bridge.polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,polymarketcdn.com
ruleset=Polymarket,[]DOMAIN-KEYWORD,polymarket
ruleset=Polymarket,[]DOMAIN-KEYWORD,thegraph
ruleset=OKX,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/OKX.list
ruleset=Direct,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/MainlandDirect.list
ruleset=Direct,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/Bilibili.list
ruleset=CodeAgent,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/CodeAgent.list
ruleset=Twitter,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/Twitter.list

; Base routing
ruleset=Direct,[]GEOIP,CN,no-resolve
ruleset=Proxy,[]FINAL

; Groups
custom_proxy_group=Proxy`select`[]CodeAgent`[]Polymarket`[]OKX`[]Twitter`[]DE + IE Pool`[]DE + AT Pool`[]GB + IE Pool`[]HK Pool`[]JP Pool`[]KR Pool`[]SG Pool`[]DE Pool`[]GB Pool`[]US Pool`[]Auto`[]Fallback`[]DIRECT`.*
; Business pools intentionally match only ProxyIP chain nodes. Generic country
; pools below still match both plain country nodes and chain nodes.
custom_proxy_group=CodeAgent`select`[]CodeAgent JP Pool`[]CodeAgent KR Pool`[]CodeAgent SG Pool`[]CodeAgent HK Pool`[]Auto`[]DIRECT
custom_proxy_group=Polymarket`select`[]Polymarket DE + IE Pool`[]Polymarket DE + AT Pool`[]Polymarket KR Pool`[]Polymarket GB + IE Pool`[]Auto`[]DIRECT
custom_proxy_group=OKX`select`[]OKX HK Pool`[]OKX KR Pool`[]OKX SG Pool`[]Auto`[]DIRECT
custom_proxy_group=Twitter`select`[]JP Pool`[]KR Pool`[]SG Pool`[]HK Pool`[]Auto`[]DIRECT
custom_proxy_group=CodeAgent JP Pool`url-test`(^| )JP ↪ \[`https://api.anthropic.com/`3600,,50
custom_proxy_group=CodeAgent KR Pool`url-test`(^| )KR ↪ \[`https://api.anthropic.com/`3600,,50
custom_proxy_group=CodeAgent SG Pool`url-test`(^| )SG ↪ \[`https://api.anthropic.com/`3600,,50
custom_proxy_group=CodeAgent HK Pool`url-test`(^| )HK ↪ \[`https://api.anthropic.com/`3600,,50
custom_proxy_group=Polymarket DE + IE Pool`url-test`(^| )DE → .*IE \[`https://gamma-api.polymarket.com/markets?active=true&closed=false&limit=1`3600,,50
custom_proxy_group=Polymarket DE + AT Pool`url-test`(^| )DE → .*AT \[`https://gamma-api.polymarket.com/markets?active=true&closed=false&limit=1`3600,,50
custom_proxy_group=Polymarket KR Pool`url-test`(^| )KR ↪ \[`https://gamma-api.polymarket.com/markets?active=true&closed=false&limit=1`3600,,50
custom_proxy_group=Polymarket GB + IE Pool`url-test`(^| )GB → .*IE \[`https://gamma-api.polymarket.com/markets?active=true&closed=false&limit=1`3600,,50
custom_proxy_group=OKX HK Pool`url-test`(^| )HK ↪ \[`https://www.okx.com/api/v5/market/ticker?instId=BTC-USDT`3600,,50
custom_proxy_group=OKX KR Pool`url-test`(^| )KR ↪ \[`https://www.okx.com/api/v5/market/ticker?instId=BTC-USDT`3600,,50
custom_proxy_group=OKX SG Pool`url-test`(^| )SG ↪ \[`https://www.okx.com/api/v5/market/ticker?instId=BTC-USDT`3600,,50
custom_proxy_group=DE + IE Pool`url-test`DE .*IE \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=DE + AT Pool`url-test`DE .*AT \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=GB + IE Pool`url-test`GB .*IE \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=HK Pool`url-test`(^| )(🇭🇰 )?HK( ↪)? \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=JP Pool`url-test`(^| )(🇯🇵 )?JP( ↪)? \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=KR Pool`url-test`(^| )(🇰🇷 )?KR( ↪)? \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=SG Pool`url-test`(^| )(🇸🇬 )?SG( ↪)? \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=US Pool`url-test`(^| )(US) \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=DE Pool`url-test`(^| )(DE) \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=GB Pool`url-test`(^| )(GB) \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=Auto`url-test`.*`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=Fallback`fallback`.*`http://www.gstatic.com/generate_204`1800
custom_proxy_group=Direct`select`[]DIRECT`[]Proxy
custom_proxy_group=Final`select`[]Proxy`[]CodeAgent`[]Auto`[]Polymarket`[]OKX`[]Twitter`[]Fallback`[]DIRECT`.*

enable_rule_generator=true
overwrite_original_rules=true
