[custom]
; CFOpt lite subconverter config for asdlokj1qpi233/subconverter backends.
; Keep ruleset entries below the default max_allowed_rulesets limit of 64.

; App rule lists
; Polymarket is inlined so backend rule-file fetch failures do not drop routing.
ruleset=Polymarket,[]DOMAIN-SUFFIX,gamma-api.polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,data-api.polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,clob.polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,ws-subscriptions-clob.polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,ws-subscriptions-user.polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,bridge.polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,polymarketcdn.com
ruleset=Polymarket,[]DOMAIN-KEYWORD,polymarket
ruleset=Polymarket,[]DOMAIN-KEYWORD,thegraph
ruleset=OKX,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/OKX.list
ruleset=Direct,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/MainlandDirect.list
ruleset=Direct,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/Bilibili.list
ruleset=CodeAgent,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/CodeAgent.list

; Base routing
ruleset=Direct,[]GEOIP,CN,no-resolve
ruleset=Proxy,[]FINAL

; Groups
custom_proxy_group=Proxy`select`[]CodeAgent`[]Polymarket`[]OKX`[]DE + IE Pool`[]DE + AT Pool`[]GB + IE Pool`[]HK Pool`[]JP Pool`[]KR Pool`[]SG Pool`[]DE Pool`[]GB Pool`[]US Pool`[]Auto`[]Fallback`[]DIRECT`.*
; If the checked API is Cloudflare-fronted, keep the service pool on ProxyIP
; chain nodes: match the extra marker between country code and "[" (for example
; "HK arrow [...]"). Plain country nodes can become CF-to-CF direct access and fail.
custom_proxy_group=CodeAgent`select`[]CodeAgent JP Pool`[]CodeAgent KR Pool`[]CodeAgent SG Pool`[]CodeAgent HK Pool`[]Auto`[]DIRECT
custom_proxy_group=Polymarket`select`[]Polymarket DE + IE Pool`[]Polymarket DE + AT Pool`[]Polymarket KR Pool`[]Polymarket GB + IE Pool`[]Auto`[]DIRECT
custom_proxy_group=OKX`select`[]OKX HK Pool`[]OKX KR Pool`[]OKX SG Pool`[]Auto`[]DIRECT
custom_proxy_group=CodeAgent JP Pool`url-test`JP [^\[]+\[`[]Auto`https://api.anthropic.com/`3600,,50
custom_proxy_group=CodeAgent KR Pool`url-test`KR [^\[]+\[`[]Auto`https://api.anthropic.com/`3600,,50
custom_proxy_group=CodeAgent SG Pool`url-test`SG [^\[]+\[`[]Auto`https://api.anthropic.com/`3600,,50
custom_proxy_group=CodeAgent HK Pool`url-test`HK [^\[]+\[`[]Auto`https://api.anthropic.com/`3600,,50
custom_proxy_group=Polymarket DE + IE Pool`url-test`DE .*IE \[`[]Auto`https://gamma-api.polymarket.com/markets?active=true&closed=false&limit=1`3600,,50
custom_proxy_group=Polymarket DE + AT Pool`url-test`DE .*AT \[`[]Auto`https://gamma-api.polymarket.com/markets?active=true&closed=false&limit=1`3600,,50
custom_proxy_group=Polymarket KR Pool`url-test`KR.*\[`[]Auto`https://gamma-api.polymarket.com/markets?active=true&closed=false&limit=1`3600,,50
custom_proxy_group=Polymarket GB + IE Pool`url-test`GB .*IE \[`[]Auto`https://gamma-api.polymarket.com/markets?active=true&closed=false&limit=1`3600,,50
custom_proxy_group=OKX HK Pool`url-test`HK [^\[]+\[`[]Auto`https://www.okx.com/api/v5/market/ticker?instId=BTC-USDT`3600,,50
custom_proxy_group=OKX KR Pool`url-test`KR [^\[]+\[`[]Auto`https://www.okx.com/api/v5/market/ticker?instId=BTC-USDT`3600,,50
custom_proxy_group=OKX SG Pool`url-test`SG [^\[]+\[`[]Auto`https://www.okx.com/api/v5/market/ticker?instId=BTC-USDT`3600,,50
custom_proxy_group=DE + IE Pool`url-test`DE .*IE \[`[]Auto`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=DE + AT Pool`url-test`DE .*AT \[`[]Auto`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=GB + IE Pool`url-test`GB .*IE \[`[]Auto`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=HK Pool`url-test`HK.*\[`[]Auto`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=JP Pool`url-test`JP.*\[`[]Auto`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=KR Pool`url-test`KR.*\[`[]Auto`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=SG Pool`url-test`SG.*\[`[]Auto`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=US Pool`url-test`US.*\[`[]Auto`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=DE Pool`url-test`DE.*\[`[]Auto`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=GB Pool`url-test`GB.*\[`[]Auto`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=Auto`url-test`.*`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=Fallback`fallback`.*`http://www.gstatic.com/generate_204`1800
custom_proxy_group=Direct`select`[]DIRECT`[]Proxy
custom_proxy_group=Final`select`[]Proxy`[]CodeAgent`[]Auto`[]Polymarket`[]OKX`[]Fallback`[]DIRECT`.*

enable_rule_generator=true
overwrite_original_rules=true
