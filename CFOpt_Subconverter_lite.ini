[custom]
; CFOpt lite subconverter config, ASCII only, no remote ruleset dependencies
; Use when some Clash clients fail with EOF while fetching subscription.

; Polymarket
ruleset=Polymarket,[]DOMAIN-SUFFIX,polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,polymarketcdn.com
ruleset=Polymarket,[]DOMAIN-KEYWORD,polymarket

; OKX
ruleset=OKX,[]DOMAIN-SUFFIX,okx.com
ruleset=OKX,[]DOMAIN-SUFFIX,okx.com.hk
ruleset=OKX,[]DOMAIN-SUFFIX,okx-dns.com
ruleset=OKX,[]DOMAIN-SUFFIX,okxcdn.com
ruleset=OKX,[]DOMAIN-SUFFIX,okxweb3.com
ruleset=OKX,[]DOMAIN-SUFFIX,oklink.com
ruleset=OKX,[]DOMAIN-SUFFIX,okcoin.com
ruleset=OKX,[]DOMAIN-KEYWORD,okx

; Claude Code / Codex / common AI domains
ruleset=ClaudeCode,[]DOMAIN-SUFFIX,anthropic.com
ruleset=ClaudeCode,[]DOMAIN-SUFFIX,claude.ai
ruleset=ClaudeCode,[]DOMAIN-SUFFIX,claude.com
ruleset=ClaudeCode,[]DOMAIN-SUFFIX,claudeusercontent.com
ruleset=ClaudeCode,[]DOMAIN-SUFFIX,openai.com
ruleset=ClaudeCode,[]DOMAIN-SUFFIX,chatgpt.com
ruleset=ClaudeCode,[]DOMAIN-SUFFIX,oaistatic.com
ruleset=ClaudeCode,[]DOMAIN-SUFFIX,oaiusercontent.com
ruleset=ClaudeCode,[]DOMAIN-SUFFIX,ai.com
ruleset=ClaudeCode,[]DOMAIN-KEYWORD,codex
ruleset=ClaudeCode,[]DOMAIN-KEYWORD,openai

; Base routing
ruleset=Direct,[]GEOIP,CN
ruleset=Final,[]FINAL

; Groups
custom_proxy_group=Proxy`select`[]ClaudeCode`[]Polymarket`[]OKX`[]Auto`[]LB-20min`[]Fallback`[]DIRECT`.*
custom_proxy_group=Polymarket`select`[]Polymarket-20min`(KR)\s\[
custom_proxy_group=Polymarket-20min`load-balance`(KR)\s\[`http://www.gstatic.com/generate_204`1200,,50
custom_proxy_group=OKX`select`[]OKX-20min`(HK)\s\[
custom_proxy_group=OKX-20min`load-balance`(HK)\s\[`http://www.gstatic.com/generate_204`1200,,50
custom_proxy_group=ClaudeCode`select`[]ClaudeCode-20min`(KR|SG|VN|MY|KZ|IE|US|PH|MN)\s\[
custom_proxy_group=ClaudeCode-20min`load-balance`(KR|SG|VN|MY|KZ|IE|US|PH|MN)\s\[`http://www.gstatic.com/generate_204`1200,,50
custom_proxy_group=Auto`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=LB-20min`load-balance`.*`http://www.gstatic.com/generate_204`1200,,50
custom_proxy_group=Fallback`fallback`.*`http://www.gstatic.com/generate_204`180
custom_proxy_group=Direct`select`[]DIRECT`[]Proxy
custom_proxy_group=Final`select`[]Proxy`[]ClaudeCode`[]Polymarket`[]OKX`[]Auto`[]LB-20min`[]Fallback`[]DIRECT`.*

enable_rule_generator=true
overwrite_original_rules=true
