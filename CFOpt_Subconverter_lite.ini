custom_proxy_group=🇮🇪 Ireland Pool`url-test`^IE \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇩🇪 Germany Pool`url-test`^DE \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇬🇧 United Kingdom Pool`url-test`^GB \[`http://www.gstatic.com/generate_204`3600,,50
