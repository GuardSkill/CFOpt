[custom]
; CFOpt lite subconverter config.
; Keep ruleset entries below the asdlokj1qpi233/subconverter default limit of 64.

; App rule lists
ruleset=Polymarket,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/Polymarket.list
ruleset=OKX,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/OKX.list
ruleset=Direct,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/MainlandDirect.list
ruleset=Direct,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/Bilibili.list
ruleset=CodeAgent,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/CodeAgent.list

; Base routing
ruleset=Direct,[]GEOIP,CN,no-resolve
ruleset=Proxy,[]FINAL

; Groups
custom_proxy_group=Proxy`select`[]CodeAgent`[]Polymarket`[]OKX`[]DE + IE Pool`[]DE + AT Pool`[]GB + IE Pool`[]HK Pool`[]JP Pool`[]KR Pool`[]SG Pool`[]DE Pool`[]GB Pool`[]US Pool`[]Auto`[]Fallback`[]DIRECT`.*
custom_proxy_group=CodeAgent`select`[]JP Pool`[]KR Pool`[]SG Pool`[]HK Pool`[]US Pool`[]Auto`[]DIRECT
custom_proxy_group=Polymarket`select`[]DE + IE Pool`[]DE + AT Pool`[]KR Pool`[]GB + IE Pool`[]Auto`[]DIRECT
custom_proxy_group=OKX`select`[]HK Pool`[]KR Pool`[]SG Pool`[]Auto`[]DIRECT
custom_proxy_group=DE + IE Pool`url-test`DE .*IE \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=DE + AT Pool`url-test`DE .*AT \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=GB + IE Pool`url-test`GB .*IE \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=HK Pool`url-test`(^| )(HK) \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=JP Pool`url-test`(^| )(JP) \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=KR Pool`url-test`(^| )(KR) \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=SG Pool`url-test`(^| )(SG) \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=US Pool`url-test`(^| )(US) \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=DE Pool`url-test`(^| )(DE) \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=GB Pool`url-test`(^| )(GB) \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=Auto`url-test`.*`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=Fallback`fallback`.*`http://www.gstatic.com/generate_204`1800
custom_proxy_group=Direct`select`[]DIRECT`[]Proxy
custom_proxy_group=Final`select`[]Proxy`[]CodeAgent`[]Auto`[]Polymarket`[]OKX`[]Fallback`[]DIRECT`.*

enable_rule_generator=true
overwrite_original_rules=true
