[custom]
; CFOpt lite subconverter config, ASCII only, no remote ruleset dependencies
; Use when some Clash clients fail with EOF while fetching subscription.

; Polymarket
ruleset=Polymarket,[]DOMAIN-SUFFIX,polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,clob.polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,polymarketcdn.com
ruleset=Polymarket,[]DOMAIN-KEYWORD,polymarket
ruleset=Polymarket,[]DOMAIN-KEYWORD,thegraph

; OKX
ruleset=OKX,[]DOMAIN-SUFFIX,okx.com
ruleset=OKX,[]DOMAIN-SUFFIX,okx.com.hk
ruleset=OKX,[]DOMAIN-SUFFIX,okxapi.com
ruleset=OKX,[]DOMAIN-SUFFIX,okx-dns.com
ruleset=OKX,[]DOMAIN-SUFFIX,okxcdn.com
ruleset=OKX,[]DOMAIN-SUFFIX,okxweb3.com
ruleset=OKX,[]DOMAIN-SUFFIX,okex.com
ruleset=OKX,[]DOMAIN-SUFFIX,okex.me
ruleset=OKX,[]DOMAIN-SUFFIX,oklink.com
ruleset=OKX,[]DOMAIN-SUFFIX,okcoin.com
ruleset=OKX,[]DOMAIN-KEYWORD,okx

; Code-agent / Codex / common AI domains
ruleset=CodeAgent,[]DOMAIN-SUFFIX,anthropic.com
ruleset=CodeAgent,[]DOMAIN-SUFFIX,claude.ai
ruleset=CodeAgent,[]DOMAIN-SUFFIX,claude.com
ruleset=CodeAgent,[]DOMAIN-SUFFIX,claudeusercontent.com
ruleset=CodeAgent,[]DOMAIN-SUFFIX,openai.com
ruleset=CodeAgent,[]DOMAIN-SUFFIX,chatgpt.com
ruleset=CodeAgent,[]DOMAIN-SUFFIX,oaistatic.com
ruleset=CodeAgent,[]DOMAIN-SUFFIX,oaiusercontent.com
ruleset=CodeAgent,[]DOMAIN-SUFFIX,statsigapi.net
ruleset=CodeAgent,[]DOMAIN-SUFFIX,ai.com
ruleset=CodeAgent,[]DOMAIN-KEYWORD,codex
ruleset=CodeAgent,[]DOMAIN-KEYWORD,openai

; Base routing
ruleset=Direct,[]GEOIP,CN,no-resolve
ruleset=Proxy,[]FINAL

; Groups
custom_proxy_group=Proxy`select`[]CodeAgent`[]Polymarket`[]OKX`[]Auto`[]LB-20min`[]Fallback`[]DIRECT`.*
custom_proxy_group=CodeAgent`select`[]🇯🇵 Japan Pool`[]🇰🇷 Korea Pool`[]🇸🇬 Singapore Pool
custom_proxy_group=Polymarket`select`[]🇩🇪 Germany Entry + 🇱🇺 LU Proxy`[]🇰🇷 Korea Pool`[]🇬🇧 United Kingdom Entry + 🇮🇪 IE Proxy
custom_proxy_group=OKX`select`[]🇭🇰 Hong Kong Pool`[]🇰🇷 Korea Pool`[]🇸🇬 Singapore Pool
; Shared url-test pools, see CFOpt_Subconverter.ini for the rationale.
custom_proxy_group=Asia Pool`url-test`[]🇭🇰 Hong Kong Pool`[]🇯🇵 Japan Pool`[]🇰🇷 Korea Pool`[]🇸🇬 Singapore Pool`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇩🇪 Germany Entry + 🇱🇺 LU Proxy`url-test`^(🇩🇪|🇱🇺) DE → 🇱🇺 LU \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇬🇧 United Kingdom Entry + 🇮🇪 IE Proxy`url-test`^🇬🇧 GB → 🇮🇪 IE \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇭🇰 Hong Kong Pool`url-test`^🇭🇰 HK ↪ \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇯🇵 Japan Pool`url-test`^🇯🇵 JP ↪ \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇰🇷 Korea Pool`url-test`^🇰🇷 KR ↪ \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇸🇬 Singapore Pool`url-test`^🇸🇬 SG ↪ \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇬🇧 United Kingdom Pool`url-test`^🇬🇧 GB → 🇮🇪 IE \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=CT Pool`url-test`^CF 电信优选`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=Domain Pool`url-test`^电信.*域名优选`http://www.gstatic.com/generate_204`3600,,50
; Pool limited to each region's top-5 freshly tested nodes plus the hand-picked
; domain-fronted entries, instead of all candidates, to cut periodic health-check
; requests against the CF Pages worker quota.
custom_proxy_group=Auto`url-test`测速#?0[1-5]\s|电信`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=LB-20min`load-balance`测速#?0[1-5]\s|电信`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=Fallback`fallback`测速#?0[1-5]\s|电信`http://www.gstatic.com/generate_204`1800
custom_proxy_group=Direct`select`[]DIRECT`[]Proxy
custom_proxy_group=Final`select`[]Proxy`[]CodeAgent`[]Auto`[]Polymarket`[]OKX`[]LB-20min`[]Fallback`[]DIRECT`.*

enable_rule_generator=true
overwrite_original_rules=true
