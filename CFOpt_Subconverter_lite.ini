[custom]
; CFOpt lite subconverter config.
; Keep ruleset entries below the asdlokj1qpi233/subconverter default limit of 64.

; App rule lists
ruleset=Polymarket,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/Polymarket.list
ruleset=OKX,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/OKX.list
ruleset=Direct,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/MainlandDirect.list
ruleset=CodeAgent,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/CodeAgent.list

; Base routing
ruleset=Direct,[]GEOIP,CN,no-resolve
ruleset=Proxy,[]FINAL

; Groups
custom_proxy_group=Proxy`select`[]CodeAgent`[]Polymarket`[]OKX`[]Auto`[]Fallback`[]DIRECT`.*
custom_proxy_group=CodeAgent`select`(US|JP|KR|SG|HK|美国|日本|韩国|新加坡|香港|🇺🇸|🇯🇵|🇰🇷|🇸🇬|🇭🇰)`[]Auto`[]DIRECT
custom_proxy_group=Polymarket`select`(DE|GB|IE|AT|KR|德国|英国|爱尔兰|奥地利|韩国|🇩🇪|🇬🇧|🇮🇪|🇦🇹|🇰🇷)`[]Auto`[]DIRECT
custom_proxy_group=OKX`select`(HK|KR|SG|香港|韩国|新加坡|🇭🇰|🇰🇷|🇸🇬)`[]Auto`[]DIRECT
custom_proxy_group=Auto`url-test`.*`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=Fallback`fallback`.*`http://www.gstatic.com/generate_204`1800
custom_proxy_group=Direct`select`[]DIRECT`[]Proxy
custom_proxy_group=Final`select`[]Proxy`[]CodeAgent`[]Auto`[]Polymarket`[]OKX`[]Fallback`[]DIRECT`.*

enable_rule_generator=true
overwrite_original_rules=true
