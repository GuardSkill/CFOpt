ruleset=CodeAgent,[]DOMAIN-KEYWORD,codex
ruleset=CodeAgent,[]DOMAIN-KEYWORD,openai

; Base routing
ruleset=Direct,[]GEOIP,CN,no-resolve
ruleset=Proxy,[]FINAL

; Groups
custom_proxy_group=Proxy`select`[]CodeAgent`[]Polymarket`[]OKX`[]Auto`[]LB-20min`[]Fallback`[]DIRECT`.*
custom_proxy_group=CodeAgent`select`[]🇯🇵 Japan Pool`[]🇰🇷 Korea Pool`[]🇸🇬 Singapore Pool
custom_proxy_group=Polymarket`select`[]🇩🇪 Germany Entry + 🇮🇪 IE Proxy`[]🇩🇪 Germany Entry + 🇦🇹 AT Proxy`[]🇰🇷 Korea Pool`[]🇬🇧 United Kingdom Entry + 🇮🇪 IE Proxy
custom_proxy_group=OKX`select`[]🇭🇰 Hong Kong Pool`[]🇰🇷 Korea Pool`[]🇸🇬 Singapore Pool
; Shared url-test pools, see CFOpt_Subconverter.ini for the rationale.
custom_proxy_group=Asia Pool`url-test`[]🇭🇰 Hong Kong Pool`[]🇯🇵 Japan Pool`[]🇰🇷 Korea Pool`[]🇸🇬 Singapore Pool`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇩🇪 Germany Entry + 🇮🇪 IE Proxy`url-test`^(🇩🇪|🇮🇪) DE → 🇮🇪 IE \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇩🇪 Germany Entry + 🇦🇹 AT Proxy`url-test`^(🇩🇪|🇦🇹) DE → 🇦🇹 AT \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇬🇧 United Kingdom Entry + 🇮🇪 IE Proxy`url-test`^🇬🇧 GB → 🇮🇪 IE \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇭🇰 Hong Kong Pool`url-test`^(🇭🇰 HK ↪|HK) \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇯🇵 Japan Pool`url-test`^(🇯🇵 JP ↪|JP) \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇰🇷 Korea Pool`url-test`^(🇰🇷 KR ↪|KR) \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇸🇬 Singapore Pool`url-test`^(🇸🇬 SG ↪|SG) \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇬🇧 United Kingdom Pool`url-test`^(🇬🇧 GB → 🇮🇪 IE|GB) \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=CT Pool`url-test`^CF 电信优选`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=Domain Pool`url-test`^电信.*域名优选`http://www.gstatic.com/generate_204`3600,,50
; Pool limited to each region's top-5 freshly tested nodes plus the hand-picked
; domain-fronted entries, instead of all candidates, to cut periodic health-check
; requests against the CF Pages worker quota.
custom_proxy_group=Auto`url-test`\[(BJ|CD)#0[1-5]\s|测速#?0[1-5]\s|电信`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=LB-20min`load-balance`\[(BJ|CD)#0[1-5]\s|测速#?0[1-5]\s|电信`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=Fallback`fallback`\[(BJ|CD)#0[1-5]\s|测速#?0[1-5]\s|电信`http://www.gstatic.com/generate_204`1800
custom_proxy_group=Direct`select`[]DIRECT`[]Proxy
custom_proxy_group=Final`select`[]Proxy`[]CodeAgent`[]Auto`[]Polymarket`[]OKX`[]LB-20min`[]Fallback`[]DIRECT`.*

enable_rule_generator=true
overwrite_original_rules=true
