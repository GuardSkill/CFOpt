[custom]
; CFOpt custom subconverter config, ASCII-safe version
; Use with edgetunnel SUBCONFIG:
; https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/CFOpt_Subconverter.ini
; Rule details are split into rules/*.list to avoid SUBAPI fallback to default config.

; Local/direct and common rules
ruleset=Direct,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=Direct,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=Reject,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=Reject,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

; High-priority custom routing
ruleset=Direct,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/MainlandDirect.list
ruleset=Polymarket,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/Polymarket.list
ruleset=OKX,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/OKX.list
ruleset=CodeAgent,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/CodeAgent.list
ruleset=Youtube,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/Youtube.list
ruleset=Netflix,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/Netflix.list
ruleset=DisneyPlus,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/DisneyPlus.list
ruleset=GlobalTV,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/GlobalTV.list
ruleset=TWMedia,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/TWMedia.list
ruleset=Telegram,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/Telegram.list
ruleset=Apple,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/Apple.list
ruleset=Steam,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/Steam.list
ruleset=Epic,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/Epic.list
ruleset=Linkedin,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/Linkedin.list
ruleset=Bilibili,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/Bilibili.list
ruleset=Proxy,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/Proxy.list
ruleset=Direct,https://github.com/GuardSkill/CFOpt/raw/refs/heads/main/rules/Direct.list

; ACL4SSR fallback rules
ruleset=Proxy,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=Proxy,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=Proxy,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list
ruleset=Direct,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=Direct,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=Direct,[]GEOIP,CN,no-resolve
ruleset=Proxy,[]FINAL

; Main groups
custom_proxy_group=Proxy`select`[]CodeAgent`[]Region`[]Auto`[]Fallback`[]DIRECT`.*

; Service routing defaults:
; - Polymarket: DE entry with IE proxy, DE entry with AT proxy, Korea pool, GB entry with IE proxy
; - OKX: Hong Kong, Korea, Singapore same-country proxy pools
; - CodeAgent: United States, Japan, Korea, Singapore same-country proxy pools
custom_proxy_group=CodeAgent`select`[]🇺🇸 United States Pool`[]🇯🇵 Japan Pool`[]🇰🇷 Korea Pool`[]🇸🇬 Singapore Pool
custom_proxy_group=Polymarket`select`[]🇩🇪 Germany Entry + 🇮🇪 IE Proxy`[]🇩🇪 Germany Entry + 🇦🇹 AT Proxy`[]🇰🇷 Korea Pool`[]🇬🇧 United Kingdom Entry + 🇮🇪 IE Proxy
custom_proxy_group=OKX`select`[]🇭🇰 Hong Kong Pool`[]🇰🇷 Korea Pool`[]🇸🇬 Singapore Pool
custom_proxy_group=Region`select`[]Asia Pool`[]Europe Pool`[]🇺🇸 United States Pool`[]🇭🇰 Hong Kong Pool`[]🇯🇵 Japan Pool`[]🇰🇷 Korea Pool`[]🇸🇬 Singapore Pool`[]🇵🇭 Philippines Pool`[]🇻🇳 Vietnam Pool`[]🇲🇾 Malaysia Pool`[]🇰🇿 Kazakhstan Pool`[]🇲🇳 Mongolia Pool`[]🇮🇪 Ireland Pool`[]🇩🇪 Germany Pool`[]🇬🇧 United Kingdom Pool`[]🇳🇱 Netherlands Pool`[]🇮🇹 Italy Pool`[]🇩🇪 Germany Entry + 🇮🇪 IE Proxy`[]🇩🇪 Germany Entry + 🇦🇹 AT Proxy`[]🇬🇧 United Kingdom Entry + 🇮🇪 IE Proxy

; Shared url-test pools. Business same-country nodes are folded into the
; matching country pool to avoid duplicate Clash group names.
custom_proxy_group=Asia Pool`url-test`[]🇭🇰 Hong Kong Pool`[]🇯🇵 Japan Pool`[]🇰🇷 Korea Pool`[]🇸🇬 Singapore Pool`[]🇵🇭 Philippines Pool`[]🇻🇳 Vietnam Pool`[]🇲🇾 Malaysia Pool`[]🇰🇿 Kazakhstan Pool`[]🇲🇳 Mongolia Pool`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=Europe Pool`url-test`[]🇮🇪 Ireland Pool`[]🇩🇪 Germany Pool`[]🇬🇧 United Kingdom Pool`[]🇳🇱 Netherlands Pool`[]🇮🇹 Italy Pool`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇩🇪 Germany Entry + 🇮🇪 IE Proxy`url-test`^(🇩🇪|🇮🇪) DE → 🇮🇪 IE \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇩🇪 Germany Entry + 🇦🇹 AT Proxy`url-test`^(🇩🇪|🇦🇹) DE → 🇦🇹 AT \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇬🇧 United Kingdom Entry + 🇮🇪 IE Proxy`url-test`^🇬🇧 GB → 🇮🇪 IE \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇭🇰 Hong Kong Pool`url-test`^HK \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇯🇵 Japan Pool`url-test`^JP \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇰🇷 Korea Pool`url-test`^KR \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇸🇬 Singapore Pool`url-test`^SG \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇵🇭 Philippines Pool`url-test`^PH \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇻🇳 Vietnam Pool`url-test`^VN \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇲🇾 Malaysia Pool`url-test`^MY \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇰🇿 Kazakhstan Pool`url-test`^KZ \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇲🇳 Mongolia Pool`url-test`^MN \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇺🇸 United States Pool`url-test`^US \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇮🇪 Ireland Pool`url-test`^IE \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇩🇪 Germany Pool`url-test`^DE \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇬🇧 United Kingdom Pool`url-test`^GB \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇳🇱 Netherlands Pool`url-test`^NL \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇮🇹 Italy Pool`url-test`^IT \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=CT Pool`url-test`^CF 电信优选`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=Domain Pool`url-test`^电信.*域名优选`http://www.gstatic.com/generate_204`3600,,50

custom_proxy_group=Youtube`select`[]Proxy`[]Region`[]Auto`[]Fallback`[]DIRECT`.*
custom_proxy_group=Netflix`select`[]Proxy`[]Region`[]Auto`[]Fallback`[]DIRECT`.*
custom_proxy_group=DisneyPlus`select`[]Proxy`[]Region`[]Auto`[]Fallback`[]DIRECT`.*
custom_proxy_group=GlobalTV`select`[]Proxy`[]Region`[]Auto`[]Fallback`[]DIRECT`.*
custom_proxy_group=TWMedia`select`[]Proxy`[]Region`[]Auto`[]Fallback`[]DIRECT`.*
custom_proxy_group=Telegram`select`[]Proxy`[]Region`[]Auto`[]Fallback`[]DIRECT`.*
custom_proxy_group=Apple`select`[]Proxy`[]Region`[]Auto`[]Fallback`[]DIRECT`.*
custom_proxy_group=Steam`select`[]Proxy`[]Region`[]Auto`[]Fallback`[]DIRECT`.*
custom_proxy_group=Epic`select`[]Proxy`[]Region`[]Auto`[]Fallback`[]DIRECT`.*
custom_proxy_group=Linkedin`select`[]Proxy`[]Region`[]Auto`[]Fallback`[]DIRECT`.*
custom_proxy_group=Bilibili`select`[]Proxy`[]Region`[]Auto`[]Fallback`[]DIRECT`.*

; Generic automatic groups
; Pool limited to each region's top-5 freshly tested nodes plus the hand-picked
; domain-fronted entries, instead of all candidates. The full .* pool is still
; selectable manually under Proxy, but periodic url-test/fallback health checks
; would otherwise hit every candidate through the CF Pages worker on a timer,
; burning request quota even when idle.
custom_proxy_group=Auto`url-test`\[(BJ|CD)#0[1-5]\s|测速#?0[1-5]\s|电信`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=Fallback`fallback`\[(BJ|CD)#0[1-5]\s|测速#?0[1-5]\s|电信`http://www.gstatic.com/generate_204`1800
custom_proxy_group=Direct`select`[]DIRECT`[]Proxy
custom_proxy_group=Reject`select`[]REJECT`[]DIRECT

enable_rule_generator=true
overwrite_original_rules=true
