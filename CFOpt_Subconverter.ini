[custom]
; CFOpt custom subconverter config, ASCII-safe version
; Use with edgetunnel SUBCONFIG:
; https://raw.githubusercontent.com/GuardSkill/CFOpt/main/CFOpt_Subconverter.ini
; Rule details are split into rules/*.list to avoid SUBAPI fallback to default config.

; Local/direct and common rules
ruleset=Direct,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=Direct,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=Reject,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=Reject,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

; High-priority custom routing
ruleset=Direct,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/MainlandDirect.list
; Polymarket is inlined so backend rule-file fetch failures do not drop routing.
ruleset=Polymarket,[]DOMAIN-SUFFIX,gamma-api.polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,data-api.polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,clob.polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,ws-subscriptions-clob.polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,ws-subscriptions-user.polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,bridge.polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,polymarketcdn.com
ruleset=Polymarket,[]DOMAIN-KEYWORD,polymarket
ruleset=Polymarket,[]DOMAIN-KEYWORD,thegraph
ruleset=OKX,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/OKX.list
ruleset=CodeAgent,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/CodeAgent.list
ruleset=Twitter,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/Twitter.list
ruleset=Youtube,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/Youtube.list
ruleset=Netflix,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/Netflix.list
ruleset=DisneyPlus,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/DisneyPlus.list
ruleset=GlobalTV,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/GlobalTV.list
ruleset=TWMedia,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/TWMedia.list
ruleset=Telegram,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/Telegram.list
ruleset=Apple,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/Apple.list
ruleset=Steam,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/Steam.list
ruleset=Epic,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/Epic.list
ruleset=Linkedin,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/Linkedin.list
ruleset=Direct,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/Bilibili.list
ruleset=Proxy,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/Proxy.list
ruleset=Direct,https://raw.githubusercontent.com/GuardSkill/CFOpt/main/rules/Direct.list

; ACL4SSR fallback rules
ruleset=Proxy,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=Proxy,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=Proxy,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list
ruleset=Direct,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=Direct,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=Direct,[]GEOIP,CN,no-resolve
ruleset=Proxy,[]FINAL

; Main groups
custom_proxy_group=Proxy`select`[]CodeAgent`[]Polymarket`[]OKX`[]Twitter`[]DE + IE Pool`[]DE + AT Pool`[]GB + IE Pool`[]HK Pool`[]JP Pool`[]KR Pool`[]SG Pool`[]HK Proxy ↪`[]JP Proxy ↪`[]KR Proxy ↪`[]SG Proxy ↪`[]Auto`[]LB-20min`[]Fallback`[]DIRECT`.*

; Service routing defaults use business-specific url-test pools so each service
; is checked against its own API instead of generic connectivity.
; Business pools intentionally match only ProxyIP chain nodes. Generic country
; pools below still match both plain country nodes and chain nodes.
custom_proxy_group=CodeAgent`select`[]JP Proxy ↪`[]HK Proxy ↪`[]KR Proxy ↪`[]SG Proxy ↪`[]Auto`[]DIRECT
custom_proxy_group=Polymarket`select`[]Polymarket DE + IE Pool`[]Polymarket DE + AT Pool`[]KR Proxy ↪`[]Polymarket GB + IE Pool`[]Auto`[]DIRECT
custom_proxy_group=OKX`select`[]OKX HK Proxy ↪`[]KR Proxy ↪`[]SG Proxy ↪`[]Auto`[]DIRECT
custom_proxy_group=Twitter`select`[]JP Pool`[]KR Pool`[]SG Pool`[]HK Pool`[]Auto`[]DIRECT

custom_proxy_group=JP Proxy ↪`url-test`(^| )(🇯🇵 )?JP ↪ \[`https://api.anthropic.com/`3600,,50
custom_proxy_group=KR Proxy ↪`url-test`(^| )(🇰🇷 )?KR ↪ \[`https://api.anthropic.com/`3600,,50
custom_proxy_group=SG Proxy ↪`url-test`(^| )(🇸🇬 )?SG ↪ \[`https://api.anthropic.com/`3600,,50
custom_proxy_group=HK Proxy ↪`url-test`(^| )(🇭🇰 )?HK ↪ \[`https://api.anthropic.com/`3600,,50
custom_proxy_group=Polymarket DE + IE Pool`url-test`(^| )DE → .*IE \[`https://gamma-api.polymarket.com/markets?active=true&closed=false&limit=1`3600,,50
custom_proxy_group=Polymarket DE + AT Pool`url-test`(^| )DE → .*AT \[`https://gamma-api.polymarket.com/markets?active=true&closed=false&limit=1`3600,,50
custom_proxy_group=KR Proxy ↪`url-test`^.*KR ↪ \[`https://gamma-api.polymarket.com/markets?active=true&closed=false&limit=1`3600,,50
custom_proxy_group=Polymarket GB + IE Pool`url-test`(^| )GB → .*IE \[`https://gamma-api.polymarket.com/markets?active=true&closed=false&limit=1`3600,,50
custom_proxy_group=OKX HK Proxy ↪`url-test`^.*HK ↪ \[`https://www.okx.com/api/v5/market/ticker?instId=BTC-USDT`780,,50
custom_proxy_group=KR Proxy ↪`url-test`^.*KR ↪ \[`https://www.okx.com/api/v5/market/ticker?instId=BTC-USDT`3600,,50
custom_proxy_group=SG Proxy ↪`url-test`^.*SG ↪ \[`https://www.okx.com/api/v5/market/ticker?instId=BTC-USDT`3600,,50

; Shared url-test pools. Business same-country nodes are folded into the
; matching country pool to avoid duplicate Clash group names.
custom_proxy_group=Asia Pool`url-test`[]HK Pool`[]JP Pool`[]KR Pool`[]SG Pool`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇩🇪 Germany Entry + 🇮🇪 IE Proxy`url-test`^(🇩🇪|🇮🇪) DE → 🇮🇪 IE \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇩🇪 Germany Entry + 🇦🇹 AT Proxy`url-test`^(🇩🇪|🇦🇹) DE → 🇦🇹 AT \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇬🇧 United Kingdom Entry + 🇮🇪 IE Proxy`url-test`^🇬🇧 GB → 🇮🇪 IE \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=HK Pool`url-test`^(🇭🇰 )?HK( ↪)? \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=JP Pool`url-test`^(🇯🇵 )?JP( ↪)? \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=KR Pool`url-test`^(🇰🇷 )?KR( ↪)? \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=SG Pool`url-test`^(🇸🇬 )?SG( ↪)? \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=🇬🇧 United Kingdom Pool`url-test`^(🇬🇧 GB → 🇮🇪 IE|GB) \[`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=CT Pool`url-test`^CF 电信优选`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=Domain Pool`url-test`^电信.*域名优选`http://www.gstatic.com/generate_204`3600,,50

custom_proxy_group=Youtube`select`[]Proxy`[]Auto`[]LB-20min`[]Fallback`[]DIRECT`.*
custom_proxy_group=Netflix`select`[]Proxy`[]Auto`[]LB-20min`[]Fallback`[]DIRECT`.*
custom_proxy_group=DisneyPlus`select`[]Proxy`[]Auto`[]LB-20min`[]Fallback`[]DIRECT`.*
custom_proxy_group=GlobalTV`select`[]Proxy`[]Auto`[]LB-20min`[]Fallback`[]DIRECT`.*
custom_proxy_group=TWMedia`select`[]Proxy`[]Auto`[]LB-20min`[]Fallback`[]DIRECT`.*
custom_proxy_group=Telegram`select`[]Proxy`[]Auto`[]LB-20min`[]Fallback`[]DIRECT`.*
custom_proxy_group=Apple`select`[]Proxy`[]Auto`[]LB-20min`[]Fallback`[]DIRECT`.*
custom_proxy_group=Steam`select`[]Proxy`[]Auto`[]LB-20min`[]Fallback`[]DIRECT`.*
custom_proxy_group=Epic`select`[]Proxy`[]Auto`[]LB-20min`[]Fallback`[]DIRECT`.*
custom_proxy_group=Linkedin`select`[]Proxy`[]Auto`[]LB-20min`[]Fallback`[]DIRECT`.*
; Generic automatic groups
; Pool limited to each region's top-5 freshly tested nodes plus the hand-picked
; domain-fronted entries, instead of all candidates. The full .* pool is still
; selectable manually under Proxy, but periodic url-test/fallback health checks
; would otherwise hit every candidate through the CF Pages worker on a timer,
; burning request quota even when idle.
custom_proxy_group=Auto`url-test`\[(BJ|CD)#0[1-5]\s|测速#?0[1-5]\s|电信`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=LB-20min`load-balance`\[(BJ|CD)#0[1-5]\s|测速#?0[1-5]\s|电信`http://www.gstatic.com/generate_204`3600,,50
custom_proxy_group=Fallback`fallback`\[(BJ|CD)#0[1-5]\s|测速#?0[1-5]\s|电信`http://www.gstatic.com/generate_204`1800
custom_proxy_group=Direct`select`[]DIRECT`[]Proxy
custom_proxy_group=Reject`select`[]REJECT`[]DIRECT
custom_proxy_group=Final`select`[]Proxy`[]CodeAgent`[]Auto`[]Polymarket`[]OKX`[]Twitter`[]LB-20min`[]Fallback`[]DIRECT`.*

enable_rule_generator=true
overwrite_original_rules=true
