[custom]
; CFOpt custom subconverter config
; Use with edgetunnel SUBCONFIG:
; https://raw.githubusercontent.com/GuardSkill/CFOpt/main/CFOpt_Subconverter.ini
;
; This file never hard-codes proxy IPs. It only selects nodes by the country/group
; remark generated from CloudflareSpeedTest_CD.csv and CloudflareSpeedTest_BJ.csv,
; for example: 198.41.223.63:2096#SG [86ms 76.20Mbps]

; Local/direct and common rules
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🛑 全球拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🛑 全球拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

; Polymarket
ruleset=Polymarket,[]DOMAIN-SUFFIX,polymarket.com
ruleset=Polymarket,[]DOMAIN-SUFFIX,polymarketcdn.com
ruleset=Polymarket,[]DOMAIN-KEYWORD,polymarket

; Claude Code / Codex / LLM tools
ruleset=ClaudeCode,[]DOMAIN-SUFFIX,anthropic.com
ruleset=ClaudeCode,[]DOMAIN-SUFFIX,claude.ai
ruleset=ClaudeCode,[]DOMAIN-SUFFIX,console.anthropic.com
ruleset=ClaudeCode,[]DOMAIN-SUFFIX,openai.com
ruleset=ClaudeCode,[]DOMAIN-SUFFIX,chatgpt.com
ruleset=ClaudeCode,[]DOMAIN-SUFFIX,oaistatic.com
ruleset=ClaudeCode,[]DOMAIN-SUFFIX,oaiusercontent.com
ruleset=ClaudeCode,[]DOMAIN-SUFFIX,ai.com
ruleset=ClaudeCode,[]DOMAIN-KEYWORD,codex

; General proxy/direct fallback
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

; Main groups
custom_proxy_group=🚀 节点选择`select`[]ClaudeCode`[]Polymarket`[]♻️ 自动选择`[]🔯 故障转移`[]DIRECT`.*

; Polymarket: only KR, HK, MY, IE nodes generated online
custom_proxy_group=Polymarket`select`(KR|HK|MY|IE)\s\[

; ClaudeCode: countries/regions from the target list that support both Claude/Claude Code and OpenAI/Codex.
; HK is intentionally excluded.
; PH and MN are included for future use if upstream ip.zip starts providing those groups.
custom_proxy_group=ClaudeCode`select`(KR|SG|VN|MY|KZ|IE|US|PH|MN)\s\[

; Generic automatic groups
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🔯 故障转移`fallback`.*`http://www.gstatic.com/generate_204`180
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 全球拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]ClaudeCode`[]Polymarket`[]♻️ 自动选择`[]🔯 故障转移`[]DIRECT`.*

enable_rule_generator=true
overwrite_original_rules=true
